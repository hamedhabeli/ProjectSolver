name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python_tests:
    name: Python tests (fail-closed gate 1)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: core_py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: test_smoke
        run: |
          mkdir -p test-results
          pytest core_py/tests/test_smoke.py --junitxml=test-results/test_smoke.xml

      - name: test_state
        run: |
          pytest core_py/tests/test_state.py --junitxml=test-results/test_state.xml

      - name: test_solver
        run: |
          pytest core_py/tests/test_solver.py --junitxml=test-results/test_solver.xml

      - name: test_mus
        run: |
          pytest core_py/tests/test_mus.py --junitxml=test-results/test_mus.xml

      - name: test_orchestrator
        run: |
          pytest core_py/tests/test_orchestrator.py --junitxml=test-results/test_orchestrator.xml

      - name: test_workflow
        run: |
          pytest core_py/tests/test_workflow.py --junitxml=test-results/test_workflow.xml

      - name: Upload python test reports
        uses: actions/upload-artifact@v4
        with:
          name: python-test-reports
          path: test-results/

  build_sidecar:
    name: Build Python sidecar (gate 2)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: core_py
    needs: python_tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Python sidecar
        run: |
          python build_sidecar.py

      - name: Upload sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: core_py-sidecar
          path: src-tauri/binaries/core_py-*

  tauri_bundle:
    name: Build Tauri bundle (final gate)
    runs-on: ubuntu-latest
    needs: build_sidecar
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: core_py-sidecar
          path: src-tauri/binaries

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/build.rs', 'src-tauri/src/**/*.rs', 'src-tauri/tauri.conf.json') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y             libwebkit2gtk-4.1-dev             libgtk-3-dev             libappindicator3-dev             librsvg2-dev             patchelf             pkg-config             build-essential

      - name: Make sidecar executable
        run: |
          chmod +x src-tauri/binaries/core_py-*

      - name: Install Node deps
        run: |
          npm install

      - name: Build Tauri bundle
        run: |
          npx tauri build

      - name: Upload final bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle
          path: src-tauri/target/release/bundle/**

name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python_tests:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      PYTHONPATH: core_py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Python test suite
        run: |
          mkdir -p test-results || python -c "from pathlib import Path; Path('test-results').mkdir(exist_ok=True)"
          pytest core_py/tests --junitxml=test-results/python-tests.xml

      - name: Upload python test reports
        uses: actions/upload-artifact@v4
        with:
          name: python-test-reports-${{ matrix.os }}
          path: test-results/

  frontend_tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json', 'vite.config.ts', 'src/**/*.tsx') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Node deps
        run: npm install

      - name: Run frontend tests
        run: npm run test:ui

  build_sidecar_windows:
    name: Build Windows sidecar
    runs-on: windows-latest
    needs: [python_tests, frontend_tests]
    env:
      PYTHONPATH: core_py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Python sidecar
        run: python build_sidecar.py

      - name: Upload Windows sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: core_py-sidecar-windows
          path: src-tauri/binaries/**

  windows_bundle:
    name: Build Windows bundle
    runs-on: windows-latest
    needs: build_sidecar_windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: core_py-sidecar-windows
          path: src-tauri/binaries

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json', 'package-lock.json', 'vite.config.ts', 'src/**/*.tsx') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock', 'src-tauri/build.rs', 'src-tauri/src/**/*.rs', 'src-tauri/tauri.conf.json') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Node deps
        run: npm install

      - name: Build Tauri bundle
        run: npx tauri build

      - name: Upload Windows installer EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: src-tauri/target/release/bundle/**
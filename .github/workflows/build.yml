name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      PYTHONPATH: core_py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Create test-results dir
        run: python -c "from pathlib import Path; Path('test-results').mkdir(exist_ok=True)"

      - name: test_smoke
        run: python -m pytest core_py/tests/test_smoke.py --junitxml=test-results/test_smoke.xml

      - name: test_state
        run: python -m pytest core_py/tests/test_state.py --junitxml=test-results/test_state.xml

      - name: test_solver
        run: python -m pytest core_py/tests/test_solver.py --junitxml=test-results/test_solver.xml

      - name: test_mus
        run: python -m pytest core_py/tests/test_mus.py --junitxml=test-results/test_mus.xml

      - name: test_orchestrator
        run: python -m pytest core_py/tests/test_orchestrator.py --junitxml=test-results/test_orchestrator.xml

      - name: test_workflow
        run: python -m pytest core_py/tests/test_workflow.py --junitxml=test-results/test_workflow.xml

      - name: Upload python test reports
        uses: actions/upload-artifact@v4
        with:
          name: python-test-reports-${{ matrix.os }}
          path: test-results/

  build_sidecar_windows:
    name: Build Windows sidecar
    runs-on: windows-latest
    needs: tests
    env:
      PYTHONPATH: core_py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Python sidecar
        run: python build_sidecar.py

      - name: Upload Windows sidecar binary
        uses: actions/upload-artifact@v4
        with:
          name: core_py-sidecar-windows
          path: src-tauri/binaries/core_py-*.exe

  windows_bundle:
    name: Build Windows bundle
    runs-on: windows-latest
    needs: build_sidecar_windows
    env:
      PYTHONPATH: core_py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows sidecar binary
        uses: actions/download-artifact@v4
        with:
          name: core_py-sidecar-windows
          path: src-tauri/binaries

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.toml', 'src-tauri/Cargo.lock', 'src-tauri/build.rs', 'src-tauri/src/**/*.rs', 'src-tauri/tauri.conf.json') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Node deps
        run: npm install

      - name: Build Tauri bundle
        run: npx tauri build

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/projectsolver-ai-tauri.exe

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: src-tauri/target/release/bundle/**
